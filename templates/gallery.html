<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>많은 옵션</title>
<style>
  :root {
    --bg: #f3f1ec; --surface: #fff; --surface2: #eceae4; --text: #1a1a1a; --muted: #8a8a82; --border: #e6e4dd;
    --accent: #1a1a1a; --radius: 10px;
    --font: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; height: 100vh; overflow: hidden; }
  .home { position: fixed; top: 18px; left: 18px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--muted); text-decoration: none; font-size: 1.1rem; z-index: 30; }
  .home:hover { color: var(--text); }
  .layout { display: grid; grid-template-columns: 1.35fr 1fr; height: 100vh; }
  .stage { position: relative; background: radial-gradient(120% 90% at 50% 0%, var(--surface), var(--surface2)); overflow: hidden; }
  .stage img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center 16%; opacity: 0; }
  .stage img.show { opacity: 1; animation: approach 0.85s cubic-bezier(.16,.84,.3,1) both; }
  @keyframes approach { 0% { opacity: 0; transform: scale(0.9) translateY(12px); filter: blur(3px); } 55% { opacity: 1; filter: blur(0); } 80% { transform: scale(1.012); } 100% { opacity: 1; transform: scale(1); } }
  .caption { position: absolute; left: 32px; bottom: 28px; z-index: 4; font-size: 1.5rem; font-weight: 800; letter-spacing: -0.01em; color: var(--text); text-shadow: 0 1px 12px rgba(255,255,255,0.55); }
  .caption span { font-size: 0.95rem; font-weight: 600; color: var(--muted); display: block; }
  .grid-wrap { background: var(--surface); border-left: 1px solid var(--border); padding: clamp(10px, 1.2vw, 18px); overflow: hidden; }
  .grid { display: grid; gap: clamp(6px, 0.7vw, 12px); height: 100%; }
  .thumb { position: relative; border-radius: var(--radius); overflow: hidden; cursor: pointer; border: 2px solid transparent; transition: transform 0.18s ease, border-color 0.18s ease; min-height: 0; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s ease; }
  .thumb .num { position: absolute; top: 5px; left: 7px; font-size: 0.7rem; font-weight: 700; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6); z-index: 2; }
  .thumb:hover { transform: translateY(-2px); }
  .thumb:hover img { transform: scale(1.08); }
  .thumb.active { border-color: var(--accent); }
  .thumb.active::after { content: ""; position: absolute; inset: 0; box-shadow: inset 0 0 0 2px var(--surface); border-radius: calc(var(--radius) - 2px); }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; grid-template-rows: 1fr auto; } .grid-wrap { border-left: none; border-top: 1px solid var(--border); } }
</style>
</head>
<body>
  <a class="home" href="../index.html" title="홈으로">←</a>
  <div class="layout">
    <div class="stage" id="stage"><div class="caption" id="caption"></div></div>
    <div class="grid-wrap"><div class="grid" id="grid"></div></div>
  </div>

  <script src="../lib/load-config.js"></script>
  <script>
    loadConfig('gallery', (cfg) => {
      document.title = '많은 옵션 · ' + (cfg.title || '');
      const N = cfg.count, pad = (n) => String(n).padStart(2, '0');
      const grid = document.getElementById('grid');
      const stage = document.getElementById('stage');
      const caption = document.getElementById('caption');
      // 균일 그리드(cols/rows) 또는 행별 칸 수가 다른 배열(rowPattern: 예 [3,3,3,3,4,4])
      let spanByIndex = null;
      if (cfg.rowPattern) {
        const gcd = (a, b) => (b ? gcd(b, a % b) : a), lcm = (a, b) => (a / gcd(a, b)) * b;
        const L = cfg.rowPattern.reduce((a, b) => lcm(a, b));
        grid.style.gridTemplateColumns = `repeat(${L}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${cfg.rowPattern.length}, 1fr)`;
        spanByIndex = [];
        cfg.rowPattern.forEach((c) => { for (let k = 0; k < c; k++) spanByIndex.push(L / c); });
      } else {
        grid.style.gridTemplateColumns = `repeat(${cfg.cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${cfg.rows}, 1fr)`;
      }

      const layerA = document.createElement('img'), layerB = document.createElement('img');
      [layerA, layerB].forEach((l) => { l.style.objectPosition = cfg.modelObjectPosition || 'center 16%'; });
      stage.prepend(layerB); stage.prepend(layerA);
      let front = layerA, back = layerB;
      for (let i = 1; i <= N; i++) { const im = new Image(); im.src = cfg.modelBase + cfg.modelPrefix + pad(i) + '.png'; }

      const posByIndex = cfg.patternObjectPositionByIndex || {};
      const thumbs = [];
      for (let i = 1; i <= N; i++) {
        const t = document.createElement('div');
        t.className = 'thumb'; t.dataset.n = i;
        const pos = posByIndex[String(i)] || cfg.patternObjectPosition || 'center';
        t.innerHTML = `<span class="num">${pad(i)}</span><img src="${cfg.patternBase}${cfg.patternPrefix}${pad(i)}.png" alt="옵션 ${pad(i)}" style="object-position:${pos}">`;
        if (spanByIndex) t.style.gridColumn = `span ${spanByIndex[i - 1]}`;
        grid.appendChild(t); thumbs.push(t);
      }
      const setCap = (i) => { caption.innerHTML = `${cfg.captionPrefix} ${pad(i)}<span>${cfg.sub || ''}</span>`; };
      function select(i) {
        thumbs.forEach((t) => t.classList.toggle('active', +t.dataset.n === i));
        setCap(i);
        const src = cfg.modelBase + cfg.modelPrefix + pad(i) + '.png';
        const img = new Image();
        img.onload = () => { back.src = src; back.classList.add('show'); front.classList.remove('show'); [front, back] = [back, front]; };
        img.src = src;
      }
      thumbs.forEach((t) => { const i = +t.dataset.n; t.addEventListener('mouseenter', () => select(i)); t.addEventListener('click', () => select(i)); });
      select(1);
    });
  </script>
</body>
</html>
