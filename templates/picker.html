<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>적은 옵션</title>
<style>
  :root {
    --bg: #fff; --surface: #fff; --text: #1a1a1a; --muted: #b3b3b3; --border: #e3e3e3;
    --accent: #1a1a1a; --stage-bg: #2b2c30;
    --font: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100%; }
  .home { position: fixed; top: 18px; left: 18px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--muted); text-decoration: none; font-size: 1.1rem; z-index: 30; }
  .home:hover { color: var(--text); }
  .picker { display: flex; gap: 2.6rem; padding: 2.4rem 3rem 1.8rem; background: var(--surface); flex-wrap: wrap; }
  .swatch { display: flex; flex-direction: column; align-items: center; gap: 0.7rem; background: none; border: none; cursor: pointer; padding: 0; }
  .dot-ring { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid transparent; transition: border-color 0.18s ease; }
  .dot { width: 52px; height: 52px; border-radius: 50%; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06); transition: transform 0.18s ease; }
  .label { font-size: 0.95rem; color: var(--muted); font-weight: 500; transition: color 0.18s ease; white-space: nowrap; }
  .swatch:hover .dot { transform: scale(1.06); }
  .swatch.active .dot-ring { border-color: var(--accent); }
  .swatch.active .label { color: var(--text); font-weight: 700; }
  .stage { flex: 1; background: var(--stage-bg); position: relative; overflow: hidden; min-height: 60vh; }
  .stage img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.45s ease; }
  .stage img.show { opacity: 1; }
  @media (max-width: 720px) { .picker { gap: 1.4rem; padding: 1.4rem 1.2rem; justify-content: space-around; } .dot-ring { width: 54px; height: 54px; } .dot { width: 44px; height: 44px; } .label { font-size: 0.82rem; } }
</style>
</head>
<body>
  <a class="home" href="../index.html" title="홈으로">←</a>
  <nav class="picker" id="picker"></nav>
  <div class="stage" id="stage"></div>

  <script src="../lib/load-config.js"></script>
  <script>
    loadConfig('picker', (cfg) => {
      document.documentElement.style.setProperty('--stage-bg', cfg.stageBg || '#2b2c30');
      document.title = '적은 옵션 · ' + (cfg.title || '');
      const picker = document.getElementById('picker');
      const stage = document.getElementById('stage');
      const layers = {};
      const swatches = cfg.items.map((it, i) => {
        const b = document.createElement('button');
        b.className = 'swatch' + (i === 0 ? ' active' : '');
        b.innerHTML = `<span class="dot-ring"><span class="dot" style="background:${it.color}"></span></span><span class="label">${it.label}</span>`;
        picker.appendChild(b);
        const img = document.createElement('img');
        img.src = cfg.assetBase + it.img; img.alt = it.label;
        stage.appendChild(img); layers[i] = img;
        return b;
      });
      function select(i) {
        swatches.forEach((s, j) => s.classList.toggle('active', i === j));
        Object.values(layers).forEach((im) => im.classList.remove('show'));
        layers[i].classList.add('show');
      }
      swatches.forEach((s, i) => { s.addEventListener('mouseenter', () => select(i)); s.addEventListener('click', () => select(i)); s.addEventListener('focus', () => select(i)); });
      select(0);
    });
  </script>
</body>
</html>
