<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오프닝 · 발옷 시즌2</title>
<link rel="stylesheet" href="../assets/themes.css" />
<style>
  :root {
    --bg: #e7e0d4; --surface: #f6f2ea; --surface2: #efeae0;
    --text: #1d1b18; --muted: #8a857c; --border: #e0dbd0;
    --accent: #e8402f; --accent-ink: #fff; --radius: 30px; --radius-sm: 14px;
    --shadow: 0 30px 70px -30px rgba(0,0,0,0.35);
    --font: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
    --font-head: var(--font);
    --marker: #e8402f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow: hidden; }
  .home { position: fixed; top: 18px; left: 18px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); color: var(--muted); text-decoration: none; font-size: 1.1rem; z-index: 50; }
  .home:hover { color: var(--text); }

  .carousel { display: flex; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; scrollbar-width: none; cursor: grab; align-items: center; gap: 2.5vw; padding: 0 7vw; }
  .carousel::-webkit-scrollbar { display: none; }
  .carousel.dragging { cursor: grabbing; scroll-behavior: auto; }

  /* 각 슬라이드 = 둥근 사각 프레임(대기 카드) */
  .slide { flex: 0 0 84vw; height: 86vh; scroll-snap-align: center; }
  .frame {
    width: 100%; height: 100%;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .stage { position: relative; width: 92%; max-width: 1100px; aspect-ratio: 16 / 9; }

  /* 폴라로이드 — 처음부터 그대로(등장 애니 없음) */
  .polaroid { position: absolute; left: 3%; top: 10%; width: 49%; background: #fff; padding: 1.4% 1.4% 0; border-radius: 4px; box-shadow: 0 22px 50px -18px rgba(0,0,0,0.45); transform: rotate(-3.5deg); z-index: 2; }
  .photo-wrap { position: relative; width: 100%; aspect-ratio: 16 / 9; }
  .photo-wrap > img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 2px; }

  .circle-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
  .circle-svg ellipse { fill: none; stroke: var(--marker); stroke-width: 3.2; stroke-linecap: round; pathLength: 100; stroke-dasharray: 100; stroke-dashoffset: 100; }
  .play .circle-svg ellipse { animation: draw 0.65s ease-out 0.5s forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }

  .pcaption { padding: 7% 4% 9%; }
  .pcaption .place { font-size: clamp(1rem, 1.7vw, 1.5rem); font-weight: 800; color: #1d1b18; }
  .pcaption .date { font-size: clamp(0.8rem, 1.1vw, 1rem); color: #8a857c; margin-top: 2px; }

  .arrow-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; z-index: 3; pointer-events: none; }
  .arrow-svg path { fill: none; stroke: var(--marker); stroke-width: 2.6; stroke-linecap: round; pathLength: 100; stroke-dasharray: 100; stroke-dashoffset: 100; }
  .play .arrow-svg path { animation: draw 0.55s ease-out 1.15s forwards; }
  .arrow-svg .head { opacity: 0; }
  .play .arrow-svg .head { animation: pop 0.3s ease-out 1.6s forwards; }
  @keyframes pop { from { opacity: 0; } to { opacity: 1; } }

  .zoom { position: absolute; right: 2%; top: 8%; width: 30%; aspect-ratio: 1 / 1; border-radius: 50%; background-size: cover; background-position: center; box-shadow: 0 0 0 8px #fff, 0 20px 45px -12px rgba(0,0,0,0.5); transform: scale(0); opacity: 0; z-index: 4; }
  .play .zoom { animation: zoomPop 0.75s cubic-bezier(.34,1.56,.5,1) 1.65s forwards; }
  @keyframes zoomPop { 0% { transform: scale(0); opacity: 0; } 60% { opacity: 1; } 100% { transform: scale(1); opacity: 1; } }

  .quote { position: absolute; left: 3%; bottom: 3%; max-width: 56%; z-index: 5; font-family: var(--font-head); font-size: clamp(1.3rem, 2.6vw, 2.4rem); font-weight: 800; line-height: 1.4; letter-spacing: -0.01em; color: var(--text); opacity: 0; transform: translateY(16px); }
  .play .quote { animation: dissolve 0.7s ease-out 2.25s forwards; }
  @keyframes dissolve { to { opacity: 1; transform: translateY(0); } }

  .hint { position: fixed; right: 26px; top: 50%; font-size: 2.6rem; opacity: 0.22; z-index: 40; pointer-events: none; animation: nudge 1.6s ease-in-out infinite; }
  @keyframes nudge { 0%,100% { transform: translateX(0); opacity: 0.16; } 50% { transform: translateX(14px); opacity: 0.3; } }
  .hint.hide { opacity: 0; transition: opacity 0.4s; }

  @media (max-width: 760px) { .slide { flex-basis: 88vw; } .quote { font-size: 1.2rem; max-width: 70%; } }
</style>
</head>
<body>
  <a class="home" href="../index.html" title="홈으로">←</a>
  <div class="carousel" id="carousel"></div>
  <div class="hint" id="hint">👉</div>

  <script>
    const BASE = '../assets/발옷/';
    const TOONS = [
      { photo: 'toon1-photo.png', zoom: 'toon1-zoom.png', place: '뉴스공장 라이브 투어', date: '2026. 3. 14',
        quote: '“이거 한 번 신으면\n다른 거 못 신어요”', circle: { cx: 52, cy: 80, rx: 13, ry: 17 }, arrow: 'M 78 64 Q 104 40 120 36' },
      { photo: 'toon2-photo.png', zoom: 'toon2-zoom.png', place: '독일 출장에서', date: '2024. 9. 18',
        quote: '“다시 나오면\n나도 또 살 거다”', circle: { cx: 80, cy: 62, rx: 11, ry: 15 }, arrow: 'M 84 56 Q 108 40 122 36' },
      { photo: 'toon3-photo.png', zoom: 'toon3-zoom.png', place: '스포츠공장', date: '2026. 4. 2',
        quote: '“신으면 되게 기분 좋아요\n걸리는 데가 없어서”', circle: { cx: 73, cy: 69, rx: 12, ry: 15 }, arrow: 'M 82 58 Q 106 42 120 38' },
    ];

    function arrowHead(d) {
      const nums = d.match(/[-\d.]+/g).map(Number);
      const ex = nums[nums.length - 2], ey = nums[nums.length - 1];
      return `M ${ex - 5} ${ey - 1} L ${ex} ${ey} L ${ex - 3} ${ey + 5}`;
    }

    const carousel = document.getElementById('carousel');
    TOONS.forEach((t) => {
      const slide = document.createElement('div');
      slide.className = 'slide';
      slide.innerHTML = `
        <div class="frame"><div class="stage">
          <div class="polaroid">
            <div class="photo-wrap">
              <img src="${BASE}${t.photo}" alt="">
              <svg class="circle-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <ellipse cx="${t.circle.cx}" cy="${t.circle.cy}" rx="${t.circle.rx}" ry="${t.circle.ry}"></ellipse>
              </svg>
            </div>
            <div class="pcaption"><div class="place">${t.place}</div><div class="date">${t.date}</div></div>
          </div>
          <svg class="arrow-svg" viewBox="0 0 160 90" preserveAspectRatio="none">
            <path d="${t.arrow}"></path>
            <path class="head" d="${arrowHead(t.arrow)}" stroke-dasharray="none" stroke-dashoffset="0"></path>
          </svg>
          <div class="zoom" style="background-image:url('${BASE}${t.zoom}')"></div>
          <div class="quote">${t.quote.replace(/\n/g, '<br>')}</div>
        </div></div>`;
      carousel.appendChild(slide);
    });

    const slides = [...document.querySelectorAll('.slide')];
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        const stage = e.target.querySelector('.stage');
        if (e.intersectionRatio > 0.7) { stage.classList.remove('play'); void stage.offsetWidth; stage.classList.add('play'); }
      });
    }, { threshold: [0, 0.7, 1] });
    slides.forEach((s) => io.observe(s));

    const hint = document.getElementById('hint');
    carousel.addEventListener('scroll', () => { if (carousel.scrollLeft > 40) hint.classList.add('hide'); }, { passive: true });

    let down = false, startX = 0, startScroll = 0;
    carousel.addEventListener('mousedown', (e) => { down = true; startX = e.pageX; startScroll = carousel.scrollLeft; carousel.classList.add('dragging'); });
    window.addEventListener('mouseup', () => { down = false; carousel.classList.remove('dragging'); });
    window.addEventListener('mousemove', (e) => { if (down) carousel.scrollLeft = startScroll - (e.pageX - startX); });
    window.addEventListener('keydown', (e) => {
      const w = slides[0].offsetWidth + window.innerWidth * 0.025;
      if (e.key === 'ArrowRight') carousel.scrollBy({ left: w, behavior: 'smooth' });
      if (e.key === 'ArrowLeft') carousel.scrollBy({ left: -w, behavior: 'smooth' });
    });
  </script>
  <script src="../assets/theme-switch.js"></script>
</body>
</html>
