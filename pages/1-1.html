<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>적은 옵션 · 세종</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Segoe UI", Roboto, sans-serif;
    background: #ffffff;
    color: #1a1a1a;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    min-height: 100%;
  }

  /* 홈으로 */
  .home {
    position: fixed;
    top: 18px;
    left: 18px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(255,255,255,0.85);
    border: 1px solid #e3e3e3;
    color: #555;
    text-decoration: none;
    font-size: 1.1rem;
    z-index: 20;
    transition: background 0.15s, color 0.15s;
  }
  .home:hover { background: #f0f0f0; color: #111; }

  /* 상단 컬러 선택 바 */
  .picker {
    display: flex;
    gap: 2.6rem;
    padding: 2.2rem 3rem 1.8rem;
    background: #fff;
    flex-wrap: wrap;
  }
  .swatch {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.7rem;
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }
  .dot-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid transparent;
    transition: border-color 0.18s ease;
  }
  .dot {
    width: 52px; height: 52px;
    border-radius: 50%;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.06);
    transition: transform 0.18s ease;
  }
  .label {
    font-size: 0.95rem;
    color: #b3b3b3;
    font-weight: 500;
    transition: color 0.18s ease, font-weight 0.18s ease;
    white-space: nowrap;
  }
  .swatch:hover .dot { transform: scale(1.06); }

  .swatch.active .dot-ring { border-color: #1a1a1a; }
  .swatch.active .label { color: #1a1a1a; font-weight: 700; }

  /* 메인 이미지 */
  .stage {
    flex: 1;
    background: #2b2c30;
    position: relative;
    overflow: hidden;
    min-height: 60vh;
  }
  .stage img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.45s ease;
  }
  .stage img.show { opacity: 1; }

  @media (max-width: 720px) {
    .picker { gap: 1.4rem; padding: 1.4rem 1.2rem; justify-content: space-around; }
    .dot-ring { width: 54px; height: 54px; }
    .dot { width: 44px; height: 44px; }
    .label { font-size: 0.82rem; }
  }
</style>
</head>
<body>
  <a class="home" href="../index.html" title="홈으로">←</a>

  <nav class="picker" id="picker">
    <button class="swatch active" data-img="01-맑은순은">
      <span class="dot-ring"><span class="dot" style="background:linear-gradient(145deg,#ededed,#c2c2c2)"></span></span>
      <span class="label">맑은순은</span>
    </button>
    <button class="swatch" data-img="02-황금연두">
      <span class="dot-ring"><span class="dot" style="background:#e3ec39"></span></span>
      <span class="label">황금연두</span>
    </button>
    <button class="swatch" data-img="03-달빛초록">
      <span class="dot-ring"><span class="dot" style="background:#4e9b39"></span></span>
      <span class="label">달빛초록</span>
    </button>
    <button class="swatch" data-img="04-검은진주">
      <span class="dot-ring"><span class="dot" style="background:#2c2c2c"></span></span>
      <span class="label">검은진주</span>
    </button>
  </nav>

  <div class="stage" id="stage"></div>

  <script>
    const BASE = '../assets/data-세종/';
    const swatches = [...document.querySelectorAll('.swatch')];
    const stage = document.getElementById('stage');

    // 이미지 레이어 미리 생성(부드러운 크로스페이드)
    const layers = {};
    swatches.forEach((s) => {
      const key = s.dataset.img;
      const img = document.createElement('img');
      img.src = BASE + key + '.png';
      img.alt = s.querySelector('.label').textContent;
      stage.appendChild(img);
      layers[key] = img;
    });

    function select(sw) {
      swatches.forEach((s) => s.classList.toggle('active', s === sw));
      Object.values(layers).forEach((img) => img.classList.remove('show'));
      layers[sw.dataset.img].classList.add('show');
    }

    swatches.forEach((s) => {
      s.addEventListener('mouseenter', () => select(s));
      s.addEventListener('click', () => select(s));
      s.addEventListener('focus', () => select(s));
    });

    // 기본: 첫번째
    select(swatches[0]);
  </script>
</body>
</html>
