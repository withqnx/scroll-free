<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>스압 해결 방법</title>
<style>
  :root {
    --bg: #0e0f13; --panel: #171922; --panel-2: #1e2130; --line: #2b2f40;
    --text: #f4f5f8; --muted: #9aa0b5; --accent: #6c8cff; --accent-2: #b98bff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(108,140,255,0.18), transparent 60%),
      radial-gradient(1000px 500px at 100% 110%, rgba(185,139,255,0.14), transparent 55%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 6vh 5vw; -webkit-font-smoothing: antialiased;
  }
  header { text-align: center; margin-bottom: 5vh; }
  h1 { font-size: clamp(2rem, 4.5vw, 3.6rem); font-weight: 800; letter-spacing: -0.02em; line-height: 1.1; }
  h1 .grad { background: linear-gradient(100deg, var(--accent), var(--accent-2)); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .lede { margin-top: 1rem; color: var(--muted); font-size: clamp(0.95rem, 1.4vw, 1.15rem); }
  .lede b { color: var(--text); font-weight: 700; }

  .section-label {
    display: flex; align-items: center; gap: 0.7rem;
    font-size: 0.8rem; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--muted); margin: 0 auto 1.3rem; max-width: 1280px; width: 100%;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .row { display: flex; flex-wrap: wrap; gap: 1.3rem; justify-content: center; width: 100%; max-width: 1280px; margin-bottom: 4.5vh; }
  .card {
    position: relative; flex: 1 1 180px; max-width: 240px; min-height: 210px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line); border-radius: 20px; padding: 1.5rem 1.4rem;
    text-decoration: none; color: inherit; display: flex; flex-direction: column; justify-content: space-between;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease; cursor: pointer; overflow: hidden;
  }
  .card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: 0 18px 40px -18px rgba(108,140,255,0.6); }
  .badge { align-self: flex-start; font-size: 0.78rem; font-weight: 700; color: var(--accent); background: rgba(108,140,255,0.12); border: 1px solid rgba(108,140,255,0.3); padding: 0.3rem 0.7rem; border-radius: 999px; }
  .card .title { font-size: 1.45rem; font-weight: 800; letter-spacing: -0.01em; margin-top: auto; }
  .card .ex { margin-top: 0.55rem; font-size: 0.9rem; color: var(--muted); }
  .card .ex b { color: var(--text); font-weight: 600; }
  .card .arrow { position: absolute; right: 1.2rem; bottom: 1.2rem; opacity: 0; transform: translateX(-4px); transition: opacity 0.18s ease, transform 0.18s ease; color: var(--accent); }
  .card:hover .arrow { opacity: 1; transform: translateX(0); }

  /* 내용 칩 */
  .chips { display: flex; flex-wrap: wrap; gap: 0.7rem; justify-content: center; width: 100%; max-width: 980px; }
  .chip {
    font-size: 1rem; font-weight: 600; color: var(--text);
    background: rgba(255,255,255,0.04); border: 1px solid var(--line);
    padding: 0.7rem 1.3rem; border-radius: 999px;
    transition: border-color 0.16s ease, background 0.16s ease;
  }
  .chip:hover { border-color: var(--accent-2); background: rgba(185,139,255,0.08); }

  @media (max-width: 720px) { .card { max-width: none; min-height: 140px; flex-basis: 45%; } .card .title { font-size: 1.2rem; } }
</style>
</head>
<body>
  <header>
    <h1><span class="grad">스압 해결 방법</span></h1>
    <p class="lede"><b>템플릿</b>(인터랙션 형식)에 <b>내용</b>을 담아 상세페이지를 구성합니다</p>
  </header>

  <div class="section-label">템플릿</div>
  <nav class="row">
    <a class="card" href="pages/1-1.html" data-target="1-1">
      <span class="badge">1-1</span>
      <div><div class="title">적은 옵션</div><div class="ex">예시 · <b>세종</b></div></div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="pages/1-2.html" data-target="1-2">
      <span class="badge">1-2</span>
      <div><div class="title">제조 과정</div><div class="ex">예시 · <b>틈</b></div></div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="pages/2.html" data-target="2">
      <span class="badge">2</span>
      <div><div class="title">소재</div><div class="ex">예시 · <b>꽃셔츠</b></div></div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="pages/3.html" data-target="3">
      <span class="badge">3</span>
      <div><div class="title">오프닝</div><div class="ex">예시 · <b>발옷 시즌2</b></div></div>
      <span class="arrow">→</span>
    </a>
    <a class="card" href="pages/4.html" data-target="4">
      <span class="badge">4</span>
      <div><div class="title">많은 옵션</div><div class="ex">예시 · <b>꽃셔츠</b></div></div>
      <span class="arrow">→</span>
    </a>
  </nav>

  <div class="section-label">내용</div>
  <div class="chips">
    <span class="chip">옵션</span>
    <span class="chip">디테일</span>
    <span class="chip">제조과정</span>
    <span class="chip">소구포인트</span>
    <span class="chip">소재</span>
    <span class="chip">인트로</span>
    <span class="chip">룩북</span>
  </div>
</body>
</html>
