<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>스압 해결 방법</title>
<style>
  :root {
    --bg: #0e0f13;
    --panel: #171922;
    --panel-2: #1e2130;
    --line: #2b2f40;
    --text: #f4f5f8;
    --muted: #9aa0b5;
    --accent: #6c8cff;
    --accent-2: #b98bff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
      "Segoe UI", Roboto, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% -10%, rgba(108,140,255,0.18), transparent 60%),
      radial-gradient(1000px 500px at 100% 110%, rgba(185,139,255,0.14), transparent 55%),
      var(--bg);
    color: var(--text);
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6vh 5vw;
    -webkit-font-smoothing: antialiased;
  }

  header {
    text-align: center;
    margin-bottom: 7vh;
  }
  .eyebrow {
    font-size: 0.85rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }
  h1 {
    font-size: clamp(2rem, 4.5vw, 3.6rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  h1 .grad {
    background: linear-gradient(100deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .sub {
    margin-top: 1.1rem;
    color: var(--muted);
    font-size: clamp(0.95rem, 1.4vw, 1.15rem);
  }

  /* 가로 배치 버튼 행 */
  .row {
    display: flex;
    flex-wrap: wrap;
    gap: 1.4rem;
    justify-content: center;
    align-items: stretch;
    width: 100%;
    max-width: 1280px;
  }

  .card {
    position: relative;
    flex: 1 1 180px;
    max-width: 240px;
    min-height: 220px;
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 1.6rem 1.4rem;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    cursor: pointer;
    overflow: hidden;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(108,140,255,0.0), rgba(108,140,255,0.0));
    transition: background 0.18s ease;
  }
  .card:hover {
    transform: translateY(-6px);
    border-color: var(--accent);
    box-shadow: 0 18px 40px -18px rgba(108,140,255,0.6);
  }
  .card:hover::before {
    background: linear-gradient(160deg, rgba(108,140,255,0.10), rgba(185,139,255,0.06));
  }

  .badge {
    align-self: flex-start;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent);
    background: rgba(108,140,255,0.12);
    border: 1px solid rgba(108,140,255,0.3);
    padding: 0.3rem 0.7rem;
    border-radius: 999px;
  }

  .card .title {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin-top: auto;
  }
  .card .ex {
    margin-top: 0.6rem;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.9rem;
    color: var(--muted);
  }
  .card .ex b {
    color: var(--text);
    font-weight: 600;
  }
  .card .arrow {
    position: absolute;
    right: 1.2rem;
    bottom: 1.2rem;
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.18s ease, transform 0.18s ease;
    color: var(--accent);
  }
  .card:hover .arrow { opacity: 1; transform: translateX(0); }

  footer {
    margin-top: 7vh;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.04em;
  }

  @media (max-width: 720px) {
    .card { max-width: none; min-height: 150px; flex-basis: 45%; }
    .card .title { font-size: 1.25rem; }
  }
</style>
</head>
<body>
  <header>
    <h1><span class="grad">스압 해결 방법</span></h1>
  </header>

  <nav class="row">
    <a class="card" href="pages/1-1.html" data-target="1-1">
      <span class="badge">1-1</span>
      <div>
        <div class="title">적은 옵션</div>
        <div class="ex">예시 · <b>세종</b></div>
      </div>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

    <a class="card" href="pages/1-2.html" data-target="1-2">
      <span class="badge">1-2</span>
      <div>
        <div class="title">제조 과정</div>
        <div class="ex">예시 · <b>틈</b></div>
      </div>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

    <a class="card" href="pages/2.html" data-target="2">
      <span class="badge">2</span>
      <div>
        <div class="title">소재</div>
        <div class="ex">예시 · <b>꽃셔츠</b></div>
      </div>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

    <a class="card" href="pages/3.html" data-target="3">
      <span class="badge">3</span>
      <div>
        <div class="title">오프닝</div>
        <div class="ex">예시 · <b>발옷 시즌2</b></div>
      </div>
      <span class="arrow" aria-hidden="true">→</span>
    </a>

    <a class="card" href="pages/4.html" data-target="4">
      <span class="badge">4</span>
      <div>
        <div class="title">많은 옵션</div>
        <div class="ex">예시 · <b>꽃셔츠</b></div>
      </div>
      <span class="arrow" aria-hidden="true">→</span>
    </a>
  </nav>

  <script>
    // 아직 안 만든 페이지(2·3·4)는 안내만. 1-1·1-2는 그대로 이동.
    document.querySelectorAll('.card[data-soon]').forEach((card) => {
      card.addEventListener('click', (e) => {
        e.preventDefault();
        alert(`[${card.dataset.target}] 페이지는 준비 중이에요. 곧 연결됩니다.`);
      });
    });
  </script>
</body>
</html>
